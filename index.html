<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON — shop</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  /* 全局重置與 Apple 風格變數 */
  :root {
    --sf-grey: #f5f5f7;
    --sf-dark: #1d1d1f;
    --sf-text-grey: #6e6e73;
    --sf-blue: #0066cc;
    --sf-border: rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
    background: #fff; 
    color: var(--sf-dark);
    -webkit-font-smoothing: antialiased;
  }

  /* 頂部全域導覽列 */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem; height: 48px;
    background: rgba(22, 22, 23, 0.8);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 200;
  }
  .nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 4px; color: #f5f5f7; cursor: pointer; transition: opacity 0.2s; }
  .nav-logo:hover { opacity: 0.8; }
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links span { font-size: 12px; color: #cccccc; cursor: pointer; transition: color 0.2s; font-weight: 300; }
  .nav-links span:hover { color: #fff; }
  .nav-icons { display: flex; gap: 1.5rem; align-items: center; }
  .nav-icons i { font-size: 16px; color: #cccccc; cursor: pointer; transition: color 0.2s; }
  .nav-icons i:hover { color: #fff; }
  .cart-badge { position: relative; display: inline-block; cursor: pointer; }
  .badge-dot { 
    position: absolute; top: -6px; right: -8px; width: 14px; height: 14px; 
    background: #fff; color: #161617; font-size: 9px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; font-weight: 600; 
  }

  /* Apple 式子導覽列 (Subnav) */
  .subnav {
    position: sticky; top: 48px; z-index: 190;
    height: 52px; background: rgba(255,255,255,0.8);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--sf-border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem;
  }
  .subnav-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .subnav-right { display: flex; align-items: center; gap: 1.5rem; }
  .subnav-right span { font-size: 12px; color: var(--sf-text-grey); }
  .subnav-btn { 
    padding: 4px 12px; background: var(--sf-blue); color: #fff; 
    border-radius: 980px; font-size: 12px; font-weight: 400; border: none; cursor: pointer; 
  }
  .subnav-btn:hover { background: #0077ed; }

  /* 核心頁面切換控制 */
  .page { display: none; }
  .page.active { display: block; }

  /* HOME PAGE */
  .hero {
    height: 620px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000; color: #fff; text-align: center; padding: 2rem; position: relative;
  }
  .hero-eyebrow { font-size: 14px; font-weight: 500; letter-spacing: 3px; color: #f5f5f7; text-transform: uppercase; margin-bottom: 1rem; }
  .hero-title { font-size: 72px; font-weight: 600; letter-spacing: -3px; line-height: 1.05; margin-bottom: 1.5rem; text-transform: uppercase; }
  .hero-sub { font-size: 24px; color: #86868b; margin-bottom: 2.5rem; font-weight: 300; }
  .hero-btns { display: flex; gap: 20px; }
  
  /* 經典 Apple 膠囊按鈕 */
  .btn-primary { padding: 12px 26px; background: var(--sf-blue); color: #fff; border: none; border-radius: 980px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #0077ed; }
  .btn-ghost { padding: 12px 26px; background: transparent; color: var(--sf-blue); border: 1px solid var(--sf-blue); border-radius: 980px; font-size: 15px; cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { background: var(--sf-blue); color: #fff; }

  /* 品牌特性欄位 */
  .features { display: flex; background: var(--sf-grey); border-bottom: 0.5px solid var(--sf-border); }
  .feature-item { flex: 1; padding: 2.5rem 1.5rem; text-align: center; border-right: 0.5px solid var(--sf-border); }
  .feature-item:last-child { border-right: none; }
  .feature-item i { font-size: 24px; color: var(--sf-dark); margin-bottom: 12px; display: block; }
  .feature-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .feature-sub { font-size: 12px; color: var(--sf-text-grey); line-height: 1.4; }

  /* Apple Bento Box 風格網格 */
  .collection { padding: 4rem 2.5rem; max-width: 1260px; margin: 0 auto; }
  .section-label { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--sf-text-grey); text-transform: uppercase; margin-bottom: 2rem; }
  .collection-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .col-card { 
    background: var(--sf-grey); border-radius: 24px; padding: 2.5rem 2.5rem; min-height: 260px;
    display: flex; flex-direction: column; justify-content: flex-start;
    cursor: pointer; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s; 
  }
  .col-card:hover { transform: scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
  .col-card-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sf-text-grey); margin-bottom: 12px; }
  .col-card-title { font-size: 36px; font-weight: 600; letter-spacing: -1px; margin-bottom: 14px; line-height: 1.15; }
  .col-card-action { font-size: 15px; color: var(--sf-blue); font-weight: 400; }
  .col-card-action:hover { text-decoration: underline; }

  /* PRODUCT LIST PAGE */
  .list-container { max-width: 1260px; margin: 0 auto; padding: 2.5rem; }
  .filter-row { display: flex; gap: 10px; margin-bottom: 3rem; overflow-x: auto; padding-bottom: 5px; }
  .filter-chip { 
    padding: 8px 20px; border-radius: 980px; border: none; background: var(--sf-grey); 
    font-size: 14px; color: var(--sf-dark); cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .filter-chip.active, .filter-chip:hover { background: var(--sf-dark); color: #fff; }
  
  .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
  .product-card { background: #fff; border-radius: 18px; padding: 1.5rem; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
  .product-card:hover { background: var(--sf-grey); }
  .product-img { 
    width: 100%; aspect-ratio: 1/1; background: var(--sf-grey); border-radius: 12px; 
    margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; transition: transform 0.3s;
    font-size: 64px;
  }
  .product-card:hover .product-img { transform: scale(1.02); }
  .product-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
  .product-color { font-size: 13px; color: var(--sf-text-grey); margin-bottom: 10px; }
  .product-price { font-size: 15px; font-weight: 500; color: var(--sf-dark); }
  .product-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .like-btn { background: none; border: none; cursor: pointer; padding: 4px; }
  .like-btn i { font-size: 18px; color: #c7c7cc; transition: color 0.2s; }
  .like-btn.liked i { color: #ff3b30; }

  /* PRODUCT DETAIL PAGE */
  .detail-container { max-width: 1100px; margin: 0 auto; padding: 3rem 2.5rem; }
  .back-link { font-size: 14px; color: var(--sf-blue); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 2rem; }
  .detail-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 4.5rem; }
  .detail-img { background: var(--sf-grey); border-radius: 24px; display: flex; align-items: center; justify-content: center; min-height: 540px; font-size: 120px; }
  .detail-info { padding: 1rem 0; }
  .detail-category { font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--sf-text-grey); text-transform: uppercase; margin-bottom: 14px; }
  .detail-name { font-size: 40px; font-weight: 600; letter-spacing: -1.5px; margin-bottom: 12px; line-height: 1.1; }
  .detail-price { font-size: 24px; font-weight: 400; color: var(--sf-dark); margin-bottom: 3rem; }
  
  .field-label { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--sf-dark); }
  .field-label span { font-weight: 400; color: #6e6e73; }
  
  .size-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 2.5rem; }
  .size-btn { 
    padding: 12px 20px; min-width: 54px; border: 1px solid #d2d2d7; background: transparent; 
    border-radius: 10px; font-size: 14px; cursor: pointer; color: var(--sf-dark); transition: all 0.2s; 
  }
  .size-btn.selected { border: 2px solid var(--sf-dark); font-weight: 600; }
  .size-btn:hover:not(.selected) { border-color: #86868b; }
  
  .color-swatches { display: flex; gap: 14px; margin-bottom: 3.5rem; }
  .swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); outline: 2px solid transparent; transition: transform 0.2s; }
  .swatch.selected { outline: 2px solid var(--sf-dark); outline-offset: 3px; }
  
  .add-btn { width: 100%; padding: 16px; background: var(--sf-blue); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 12px; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 0.9; }
  .wishlist-btn { width: 100%; padding: 16px; background: transparent; color: var(--sf-dark); border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
  .wishlist-btn:hover { background: var(--sf-grey); }
  .detail-desc { margin-top: 3rem; padding-top: 2.5rem; border-top: 0.5px solid var(--sf-border); }
  .detail-desc p { font-size: 15px; color: var(--sf-text-grey); line-height: 1.8; }

  /* CART PAGE */
  .cart-wrap { max-width: 820px; margin: 0 auto; padding: 4rem 2.5rem; }
  .cart-title { font-size: 40px; font-weight: 600; letter-spacing: -1.5px; margin-bottom: 2.5rem; }
  .cart-item { display: flex; gap: 2rem; padding: 2rem 0; border-bottom: 0.5px solid var(--sf-border); align-items: center; }
  .cart-thumb { width: 100px; height: 100px; background: var(--sf-grey); border-radius: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .cart-info { flex: 1; }
  .cart-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
  .cart-meta { font-size: 14px; color: var(--sf-text-grey); margin-bottom: 16px; }
  .qty-row { display: flex; align-items: center; gap: 14px; }
  .qty-btn { width: 30px; height: 30px; border: 1px solid #d2d2d7; background: #fff; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { border-color: #86868b; }
  .qty-num { font-size: 15px; min-width: 24px; text-align: center; font-weight: 500; }
  .remove-btn { background: none; border: none; font-size: 14px; color: var(--sf-blue); cursor: pointer; margin-left: 1.5rem; }
  .remove-btn:hover { text-decoration: underline; }
  .cart-price { font-size: 18px; font-weight: 500; min-width: 100px; text-align: right; }
  
  .cart-summary { margin-top: 3rem; padding: 2rem; background: var(--sf-grey); border-radius: 20px; }
  .sum-row { display: flex; justify-content: space-between; font-size: 15px; padding: 8px 0; color: var(--sf-text-grey); }
  .sum-row.total { font-size: 20px; font-weight: 600; color: var(--sf-dark); border-top: 0.5px solid var(--sf-border); margin-top: 12px; padding-top: 18px; }
  .checkout-btn { width: 100%; padding: 18px; background: var(--sf-blue); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 1.5rem; }
  .checkout-btn:hover { background: #0077ed; }
  
  .empty-cart { text-align: center; padding: 6rem 2rem; }
  .empty-cart i { font-size: 64px; color: #c7c7cc; margin-bottom: 1.5rem; display: block; }
  .empty-cart p { color: var(--sf-text-grey); font-size: 19px; margin-bottom: 2rem; font-weight: 300; }
/* 貼在這裡 */
  .site-footer {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4rem 2.5rem;
    background: #ffffff;
    border-top: 0.5px solid var(--sf-border);
    margin-top: 5rem;
  }
  .footer-ig-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--sf-text-grey);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition: color 0.2s, transform 0.2s;
  }
  .footer-ig-link:hover {
    color: var(--sf-dark);
    transform: scale(1.02);
  }
  .footer-ig-link i {
    font-size: 18px;
  }
</style>
</head>
<body>

<!-- 全局主導覽列 -->
<nav>
  <div class="nav-links">
    <span onclick="setGlobalFilter('全部')">商店</span>
    <span onclick="setGlobalFilter('洋裝')">裝束</span>
    <span onclick="setGlobalFilter('上衣')">上衣</span>
    <span onclick="setGlobalFilter('外套')">外衣</span>
    <span onclick="setGlobalFilter('配件')">配件</span>
  </div>
  <div class="nav-icons">
    <i class="ti ti-search"></i>
    <i class="ti ti-user"></i>
    <div class="cart-badge" onclick="navigate('cart')">
      <i class="ti ti-shopping-bag"></i>
      <span class="badge-dot" id="cart-count">0</span>

  </div>
</nav>

<!-- 產品子導覽列 (Subnav) -->
<div class="subnav" id="global-subnav">
  <div class="subnav-title" id="subnav-page-title">GC</div>
  <div class="subnav-right">
    <span id="subnav-status">全新 2026 夏季系列現正發售</span>
    <button class="subnav-btn" onclick="navigate('list')">立即選購</button>
  </div>
</div>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="hero">
    <p class="hero-eyebrow">2026 核心系列</p>
    <h1 class="hero-title">shop</h1>
    <p class="hero-sub">design</p>
    <div class="hero-btns">
      <button class="btn-primary" onclick="navigate('list')">探索系列</button>
      <button class="btn-ghost" onclick="setGlobalFilter('全部')">觀看全部商品</button>
    </div>
  </div>
  
  <div class="features">
    <div class="feature-item">
      <i class="ti ti-truck-delivery"></i>
      <div class="feature-title">免額外運費配送</div>

    </div>
    <div class="feature-item">
      <i class="ti ti-refresh"></i>
      <div class="feature-title">30 天無憂鑑賞</div>

    </div>
    <div class="feature-item">
      <i class="ti ti-shield-check"></i>
      <div class="feature-title">卓越工藝保證</div>
      <div class="feature-sub">堅持精選歐洲天然高端材質，雋永耐穿。</div>
    </div>
  </div>

  <div class="collection">
    <p class="section-label">精選設計主題</p>
    <div class="collection-grid">
      <div class="col-card" onclick="setGlobalFilter('洋裝')">
        <div class="col-card-eyebrow">全新剪裁</div>
        <div class="col-card-title">雕琢身形<br>霧面質感連身裙</div>
        <div class="col-card-action">進一步了解 →</div>
      </div>
      <div class="col-card" onclick="setGlobalFilter('上衣')">
        <div class="col-card-eyebrow">透氣首選</div>
        <div class="col-card-title">細緻針織<br>日常休閒系列</div>
        <div class="col-card-action">進一步了解 →</div>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCT LIST PAGE -->
<div class="page" id="page-list">
  <div class="list-container">
    <div class="filter-row">
      <button class="filter-chip active" id="chip-all" onclick="filterProducts(this, '全部')">全部商店</button>
      <button class="filter-chip" onclick="filterProducts(this, '洋裝')">細肩與洋裝</button>
      <button class="filter-chip" onclick="filterProducts(this, '上衣')">經典上衣</button>
      <button class="filter-chip" onclick="filterProducts(this, '外套')">結構大衣與外套</button>
      <button class="filter-chip" onclick="filterProducts(this, '褲裝')">下著褲裝</button>
      <button class="filter-chip" onclick="filterProducts(this, '配件')">現代高訂配件</button>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>
</div>

<!-- PRODUCT DETAIL PAGE -->
<div class="page" id="page-detail">
  <div class="detail-container">
    <div class="back-link" onclick="navigate('list')"><i class="ti ti-chevron-left"></i> 返回全部商品</div>
    <div class="detail-layout">
      <div class="detail-img" id="detail-image-box">👗</div>
      <div class="detail-info">
        <div class="detail-category" id="detail-cat">CATEGORY</div>
        <h2 class="detail-name" id="detail-name">PRODUCT NAME</h2>
        <div class="detail-price" id="detail-price">NT$ 0</div>
        
        <div class="field-label">尺寸：<span id="selected-size-label">S</span></div>
        <div class="size-grid" id="size-selector-container">
          <button class="size-btn" onclick="selectSize(this, 'XS')">XS</button>
          <button class="size-btn selected" onclick="selectSize(this, 'S')">S</button>
          <button class="size-btn" onclick="selectSize(this, 'M')">M</button>
          <button class="size-btn" onclick="selectSize(this, 'L')">L</button>
          <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
        </div>
        
        <div class="field-label">外觀顏色：<span id="selected-color-label">預設色</span></div>
        <div class="color-swatches" id="color-swatches-container"></div>
        
        <button class="add-btn" id="add-to-cart-btn" onclick="executeAddToCart()">加入購物車</button>
        <button class="wishlist-btn">加入收藏列表</button>
        
        <div class="detail-desc">
          <p id="detail-desc">產品敘述加載中...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CART PAGE -->
<div class="page" id="page-cart">
  <div class="cart-wrap">
    <h2 class="cart-title">您的購物車商品。</h2>
    <div id="cart-container"></div>
  </div>
</div>

  {id:9, name:'義大利軟皮革手提托特包', cat:'配件', price:6800, emoji:'👜', desc:'採用頂級頭層牛皮手工打造，內襯空間寬敞實用。簡約流線造型不顯累贅，都會生活必備。', colors:[{name:'焦糖棕', hex:'#855e42'}, {name:'極致黑', hex:'#111111'}]},

  {id:11, name:'精紡抗皺修身西裝褲', cat:'褲裝', price:3280, emoji:'👖', desc:'專為亞洲身形微調的微錐形結構，精紡高張力面料兼顧高活動度與挺拔視覺。', colors:[{name:'深灰色', hex:'#3a3a3c'}]},
  {id:12, name:'細緻蕾絲法式透膚上衣', cat:'上衣', price:2480, emoji:'👕', desc:'極其精細的古董感蕾絲織紋，透光不透肉的巧妙層次演繹，優雅透露隱約的性感。', colors:[{name:'米白色', hex:'#fcfaf2'}]}
];

let cart = [];
let currentProduct = null;
let activeSize = 'S';
let activeColor = '';

function updateBadge() {
  const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById('cart-count').textContent = totalQty;
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  
  const subnavTitle = document.getElementById('subnav-page-title');
  if (page === 'home') { subnavTitle.textContent = 'GC'; }
  else if (page === 'list') { subnavTitle.textContent = '商店 — 全部系列'; renderProducts('全部'); }
  else if (page === 'detail') { subnavTitle.textContent = '設計細節'; }
  else if (page === 'cart') { subnavTitle.textContent = '購物袋'; renderCart(); }
  
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function setGlobalFilter(category) {
  navigate('list');
  const allChips = document.querySelectorAll('.filter-chip');
  allChips.forEach(chip => chip.classList.remove('active'));
  
  allChips.forEach(chip => {
    if(chip.textContent.includes(category) || (category === '全部' && chip.id === 'chip-all')) {
      chip.classList.add('active');
    }
  });
  renderProducts(category);
}

function filterProducts(element, category) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  element.classList.add('active');
  renderProducts(category);
}

function renderProducts(filter) {
  const grid = document.getElementById('products-grid');
  const targetList = (filter === '全部') ? products : products.filter(p => p.cat === filter);
  
  grid.innerHTML = targetList.map(p => `
    <div class="product-card" onclick="openProductDetail(${p.id})">
      <div class="product-img">${p.emoji}</div>
      <div class="product-row">
        <div>
          <div class="product-name">${p.name}</div>
          <div class="product-color">${p.colors.map(c=>c.name).join(' / ')}</div>
          <div class="product-price">NT$ ${p.price.toLocaleString()}</div>
        </div>
        <button class="like-btn" onclick="event.stopPropagation(); this.classList.toggle('liked');">
          <i class="ti ti-heart"></i>
        </button>
      </div>
    </div>
  `).join('');
}

function openProductDetail(productId) {
  const p = products.find(item => item.id === productId);
  if (!p) return;
  currentProduct = p;
  
  activeSize = 'S';
  activeColor = p.colors[0].name; 
  
  document.getElementById('detail-cat').textContent = p.cat;
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-price').textContent = 'NT$ ' + p.price.toLocaleString();
  document.getElementById('detail-desc').textContent = p.desc;
  document.getElementById('detail-image-box').textContent = p.emoji;
  
  document.getElementById('selected-size-label').textContent = activeSize;
  document.getElementById('selected-color-label').textContent = activeColor;

  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.classList.remove('selected');
    if(btn.textContent === 'S') btn.classList.add('selected');
  });

  const swatchContainer = document.getElementById('color-swatches-container');
  swatchContainer.innerHTML = p.colors.map((c, idx) => `
    <div class="swatch ${idx === 0 ? 'selected' : ''}" 
         style="background: ${c.hex}" 
         onclick="selectColor(this, '${c.name}')">
    </div>
  `).join('');

  navigate('detail');
}

function selectSize(element, size) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  element.classList.add('selected');
  activeSize = size;
  document.getElementById('selected-size-label').textContent = size;
}

function selectColor(element, colorName) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  element.classList.add('selected');
  activeColor = colorName;
  document.getElementById('selected-color-label').textContent = colorName;
}

function executeAddToCart() {
  if (!currentProduct) return;
  
  const existingItem = cart.find(item => 
    item.id === currentProduct.id && 
    item.size === activeSize && 
    item.color === activeColor
  );

  if (existingItem) {
    existingItem.qty++;
  } else {
    cart.push({
      id: currentProduct.id,
      name: currentProduct.name,
      price: currentProduct.price,
      emoji: currentProduct.emoji,
      size: activeSize,
      color: activeColor,
      qty: 1
    });
  }
  
  updateBadge();
  
  const btn = document.getElementById('add-to-cart-btn');
  btn.textContent = '已成功加入購物袋 ✓';
  btn.style.background = '#34c759'; 
  setTimeout(() => {
    btn.textContent = '加入購物車';
    btn.style.background = 'var(--sf-blue)';
  }, 1800);
}

function renderCart() {
  const container = document.getElementById('cart-container');
  if (!cart.length) {
    container.innerHTML = `
      <div class="empty-cart">
        <i class="ti ti-shopping-bag"></i>
        <p>您的購物袋是空的。</p>
        <button class="btn-primary" onclick="navigate('list')">繼續探索新品</button>
      </div>`;
    return;
  }

  const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  const shippingFee = (subtotal >= 1500) ? 0 : 100;

  container.innerHTML = cart.map((item, index) => `
    <div class="cart-item">
      <div class="cart-thumb">${item.emoji}</div>
      <div class="cart-info">
        <div class="cart-name">${item.name}</div>
        <div class="cart-meta">外觀顏色：${item.color} ｜ 尺寸：${item.size}</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="modifyQty(${index}, -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="modifyQty(${index}, 1)">+</button>
          <button class="remove-btn" onclick="deleteItem(${index})">移除</button>
        </div>
      </div>
      <div class="cart-price">NT$ ${(item.price * item.qty).toLocaleString()}</div>
    </div>
  `).join('') + `
    <div class="cart-summary">
      <div class="sum-row"><span>商品小計</span><span>NT$ ${subtotal.toLocaleString()}</span></div>
      <div class="sum-row"><span>估計運費與處理費</span><span>${shippingFee === 0 ? '免費' : 'NT$ ' + shippingFee}</span></div>
      <div class="sum-row total"><span>總計金額</span><span>NT$ ${(subtotal + shippingFee).toLocaleString()}</span></div>
    </div>
    <button class="checkout-btn" onclick="alert('感謝您的模擬訂購！')">前往安全結帳</button>
  `;
}

function modifyQty(index, delta) {
  if (cart[index]) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }
  }
  updateBadge();
  renderCart();
}

function deleteItem(index) {
  cart.splice(index, 1);
  updateBadge();
  renderCart();
}

// 初始啟動
updateBadge();
</script>
